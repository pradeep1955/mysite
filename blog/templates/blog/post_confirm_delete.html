{% extends "base_bootstrap.html" %}

{% block title %}Delete post — {{ settings.APP_NAME|default:"TinkerStack" }}{% endblock %}

{% block content %}
<section class="store-section">
  <div class="store-wrap preorder-card" style="max-width:560px; text-align:center;">
    <h3>Delete this post?</h3>
    <p>Are you sure you want to delete "{{ object.title }}"? This can't be undone.</p>
    <form method="POST" action="">
      {% csrf_token %}
      <div class="cta-row">
        <button class="btn btn-primary" type="submit">Yes, delete</button>
        <a class="btn btn-ghost" href="{% url 'post-detail' object.id %}">Cancel</a>
      </div>
    </form>
  </div>
</section>
{% endblock %}
