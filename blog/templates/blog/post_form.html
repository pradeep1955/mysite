{% extends "base_bootstrap.html" %}

{% block title %}Write a post — {{ settings.APP_NAME|default:"TinkerStack" }}{% endblock %}

{% block content %}
<section class="store-section">
  <div class="store-wrap preorder-card" style="max-width:640px;">
    <h3>Blog post</h3>
    <form method="POST" action="" class="preorder-form">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn btn-primary" type="submit">Post</button>
    </form>
  </div>
</section>
{% endblock %}
