{% extends "base_bootstrap.html" %}
{% load static %}

{% block content %}
<div class="container py-5">
    <h1 class="display-5">{{ site_name }}</h1>
    <p class="lead">A lean Django site with only the home and blog apps enabled.</p>
    <p>{{ message }}</p>
    <hr>
    <p>Use the blog section to read and publish posts.</p>
    <a class="btn btn-primary" href="{% url 'blog-home' %}">Visit Blog</a>
</div>
{% endblock content %}
